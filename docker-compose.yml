# Deploy production dengan Traefik (reverse proxy eksternal).
#
# Prasyarat di server:
#   1. Traefik sudah jalan dengan entrypoint `websecure`
#   2. Network Docker `traefik-public` sudah ada (dibuat oleh stack Traefik)
#
# Deploy:
#   cp env.prod.example .env
#   # edit .env — password pakai single quote jika ada karakter $
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: kasku-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-kasku}
      POSTGRES_DB: ${DB_NAME:-kasku}
      # POSTGRES_PASSWORD di-load dari .env (jangan pakai ${DB_PASSWORD} di sini)
    volumes:
      - kasku_pgdata:/var/lib/postgresql/data
    ports:
      # Default bind 127.0.0.1 (SSH tunnel). Set DB_PUBLISH_HOST=0.0.0.0 untuk akses remote langsung.
      - "${DB_PUBLISH_HOST:-127.0.0.1}:${DB_PUBLISH_PORT:-5432}:5432"
    networks:
      - kasku-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kasku} -d ${DB_NAME:-kasku}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasku-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-https://kasku.jismo-educational.org}
      # DB_USER, DB_PASSWORD/POSTGRES_PASSWORD, DB_NAME, JWT_SECRET dari .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kasku-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: kasku-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kasku-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.kasku.rule=Host(`kasku.jismo-educational.org`)"
      - "traefik.http.routers.kasku.entrypoints=websecure"
      - "traefik.http.routers.kasku.tls=true"
      # Uncomment jika Traefik memakai Let's Encrypt:
      # - "traefik.http.routers.kasku.tls.certresolver=letsencrypt"
      - "traefik.http.services.kasku.loadbalancer.server.port=80"

networks:
  kasku-internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  kasku_pgdata:
