services:
  postgres:
    image: postgres:16-alpine
    container_name: kasku-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-kasku}
      POSTGRES_DB: ${DB_NAME:-kasku}
    volumes:
      - kasku_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PUBLISH_HOST:-127.0.0.1}:${DB_PUBLISH_PORT:-5432}:5432"
    networks:
      - kasku-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kasku} -d ${DB_NAME:-kasku}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasku-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-https://kasku.jismo-educational.org}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kasku-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: kasku-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kasku-internal
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.kasku.rule=Host(`kasku.jismo-educational.org`)
      - traefik.http.routers.kasku.entrypoints=websecure
      - traefik.http.routers.kasku.tls=true
      - traefik.http.routers.kasku.tls.certresolver=le
      - traefik.http.services.kasku.loadbalancer.server.port=80

networks:
  kasku-internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  kasku_pgdata:
